name: Question
description: Ask a usage or setup question.
title: "[Question]: "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to understand or do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Quick Start
        - Codex MCP config
        - MiMo Code setup
        - Admin UI
        - Launcher
        - Portable ZIP / installer
        - Low-token review workflow
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Share your OS, install mode, and redacted command output if useful.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I did not include API keys, tokens, credentials, full logs, or private paths.
          required: true
