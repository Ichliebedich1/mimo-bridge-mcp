name: Bug report
description: Report a reproducible problem with MiMo Bridge MCP.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please redact API keys, tokens, personal paths, MiMo credentials, and private logs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The daemon starts, but Codex cannot see the MCP tools.
    validations:
      required: true
  - type: dropdown
    id: install-mode
    attributes:
      label: Install mode
      options:
        - Source checkout
        - Portable ZIP
        - EXE installer
        - Other / not sure
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2 x64
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant redacted logs
      description: Include only the smallest relevant excerpt. Redact usernames, private paths, tokens, and credentials.
      render: text
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checklist
      options:
        - label: I removed API keys, tokens, credentials, and private paths from this report.
          required: true
        - label: I did not attach full private logs or task Worktrees.
          required: true
